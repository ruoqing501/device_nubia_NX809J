name: Build TWRP Recovery

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    
    steps:
    - name: Checkout device tree
      uses: actions/checkout@v4

    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt -y install gperf gcc-multilib g++-multilib libc6-dev lib32ncurses-dev x11proto-core-dev libx11-dev tree lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc bc ccache lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libncurses-dev libsdl1.2-dev libxml2 lzop pngcrush schedtool squashfs-tools imagemagick libbz2-dev lzma ncftp qemu-user-static libstdc++-12-dev libgflags-dev python3 curl git-core gnupg flex bison build-essential zip unzip zlib1g-dev libc6-dev-i386 libncurses5 fontconfig python-is-python3
        sudo apt clean

    - name: Install OpenJDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Setup repo tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize TWRP minimal manifest
      run: |
        mkdir -p workspace
        cd workspace
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-14.1

    - name: Repo Sync
      run: |
        cd workspace
        repo sync -j$(nproc --all) --force-sync

    - name: Clone device tree
      run: |
        cd workspace
        git clone https://github.com/${{ github.repository }} -b main device/nubia/NX809J

    - name: Verify device tree
      run: |
        cd workspace/device/nubia/NX809J
        echo "=== Kernel ==="
        file prebuilt/kernel
        ls -lh prebuilt/kernel
        echo "=== DTB ==="
        ls -lh prebuilt/dtb/dtb.img
        echo "=== Vendor binaries ==="
        ls recovery/vendor/bin/
        ls recovery/vendor/bin/hw/
        echo "=== Vendor libs ==="
        ls recovery/vendor/lib64/ | wc -l
        echo "=== Modules ==="
        ls recovery/vendor/modules/

    - name: Patch kernel.mk bug
      run: |
        cd workspace
        if [ -f vendor/twrp/build/tasks/kernel.mk ]; then
          echo "=== Patching kernel.mk ==="
          echo "Line 594 before patch:"
          sed -n '590,598p' vendor/twrp/build/tasks/kernel.mk
          sed -i '594d' vendor/twrp/build/tasks/kernel.mk
          echo "Line 594 after patch:"
          sed -n '590,598p' vendor/twrp/build/tasks/kernel.mk
        fi

    - name: Fix missing ninja dependencies
      run: |
        cd workspace
        for dir in obj obj_arm; do
          for lib in \
            android.security.apc-ndk_platform \
            android.system.keystore2-V1-ndk_platform \
            android.security.aorigin-ndk_platform \
            android.security.authorization-ndk_platform \
            android.security.maintenance-ndk_platform \
            android.system.keystore2-V3-ndk \
            android.security.apc-ndk \
            android.system.keystore2-V1-ndk \
            android.security.authorization-ndk \
            android.security.maintenance-ndk \
            android.system.keystore2-V2-ndk \
            android.system.keystore2-V2-ndk_platform \
            android.system.keystore2-V3-ndk_platform \
          ; do
            mkdir -p out/target/product/NX809J/${dir}/SHARED_LIBRARIES/${lib}_intermediates
            touch out/target/product/NX809J/${dir}/SHARED_LIBRARIES/${lib}_intermediates/${lib}.so.toc
          done
        done
    - name: Fix fscrypt policy mismatch in libtar
      run: |
        cd workspace
        sed -i 's/-Werror/-Wno-error/g' bootable/recovery/libtar/Android.mk 2>/dev/null || true
        sed -i 's/-Werror/-Wno-error/g' bootable/recovery/libtar/Android.bp 2>/dev/null || true
        
    - name: Building TWRP
      run: |
        cd workspace
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL="C"
        source build/envsetup.sh
        lunch twrp_NX809J-ap2a-eng
        make recoveryimage -j$(nproc --all)

    - name: Find recovery image
      run: |
        echo "=== Looking for recovery images ==="
        find workspace/out -name "recovery.img" -o -name "boot.img" 2>/dev/null
        echo "=== Product directory ==="
        ls -lh workspace/out/target/product/NX809J/*.img 2>/dev/null || echo "No .img files found"
        ls workspace/out/target/product/NX809J/ 2>/dev/null || echo "Product dir not found"

    - name: Upload Recovery
      uses: softprops/action-gh-release@v1
      with:
        files: |
          workspace/out/target/product/NX809J/recovery.img
        name: TWRP-NX809J-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          ## TWRP Recovery for Nubia Red Magic 11 Pro (NX809J)
          
          **WARNING: Unofficial build. Test before flashing!**
          
          ### Test (safe, temporary)
          ```
          fastboot boot recovery.img
          ```
          
          ### Install (only after testing)
          ```
          fastboot flash recovery_a recovery.img
          fastboot flash recovery_b recovery.img
          ```
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
